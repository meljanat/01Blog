<nav class="navbar">
    <div class="nav-brand">
        <a routerLink="/feed" class="brand-link">
            <span class="brand-text">01Blog</span>
        </a>
    </div>

    <div class="nav-actions">

        <ng-container *ngIf="!isLoggedIn()">
            <a routerLink="/login" class="nav-link">Login</a>
            <a routerLink="/register" class="btn-primary">Sign Up</a>
        </ng-container>

        <ng-container *ngIf="isLoggedIn()">
            <a routerLink="/feed" routerLinkActive="active" class="nav-link">Feed</a>

            <a *ngIf="isAdmin" routerLink="/admin" routerLinkActive="active" class="nav-link admin-link">Admin</a>

            <a [routerLink]="['/user', currentUser]" routerLinkActive="active" class="nav-link">Profile</a>

            <div class="notification-wrapper">

                <button class="nav-icon-btn" (click)="$event.stopPropagation(); toggleDropdown()">
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
                </button>

                <div class="notification-dropdown" *ngIf="isDropdownOpen" (click)="$event.stopPropagation()">
                    <div class="dropdown-header">
                        <h4>Notifications</h4>
                    </div>

                    <div class="dropdown-body">
                        <div *ngIf="notifications.length === 0" class="empty-notifications">
                            No new notifications.
                        </div>

                        <a *ngFor="let notif of notifications" 
                            [routerLink]="notif.type === 'FOLLOW' ? ['/user', notif.actor.username] : ['/post', notif.targetId]"
                            class="notification-item" [ngClass]="{'unread': !notif.read}"
                            (click)="readNotification(notif)">
                            <div class="notif-content">
                                <strong>{{ notif.actor.username }}</strong> {{ notif.message }}
                            </div>

                            <button class="toggle-read-btn" [title]="notif.read ? 'Mark as unread' : 'Mark as read'"
                                (click)="toggleNotification($event, notif)">
                                <div class="status-dot"></div>
                            </button>
                        </a>
                    </div>
                </div>
            </div>

            <button class="btn-logout" (click)="logout()">Logout</button>
        </ng-container>

    </div>
</nav>
