<nav class="navbar">
    <div class="navbar-brand">
        <a [routerLink]="isLoggedIn() ? '/feed' : '/login'" class="brand-link">
            <span class="brand-number">01</span>Blog
        </a>
    </div>

    <div class="navbar-menu" *ngIf="isLoggedIn()">

        <a routerLink="/feed" routerLinkActive="active" class="nav-link">Feed</a>

        <a *ngIf="currentUser" [routerLink]="['/user', currentUser]" routerLinkActive="active"
            class="nav-link">Profile</a>

        <a *ngIf="isAdmin" routerLink="/admin" routerLinkActive="active" class="nav-link admin-link">Admin</a>

        <div class="notification-wrapper">
            <button class="icon-btn bell-btn" (click)="toggleDropdown($event)" title="Notifications">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="unread-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
            </button>

            <div class="notification-dropdown" *ngIf="isDropdownOpen" (click)="$event.stopPropagation()">
                <div class="dropdown-header">
                    <h3>Notifications</h3>
                </div>

                <div class="dropdown-body">
                    <div *ngIf="notifications.length === 0" class="empty-notifications">
                        You have no new notifications.
                    </div>

                    <div *ngFor="let notif of notifications" class="notification-item" [class.unread]="!notif.read"
                        (click)="handleNotificationClick(notif, $event)">

                        <div class="notif-avatar">
                            <img *ngIf="notif.actor.profilePictureUrl"
                                [src]="'http://localhost:8080/uploads/' + notif.actor.profilePictureUrl" alt="Avatar">
                            <span *ngIf="!notif.actor.profilePictureUrl">{{ notif.actor.username.charAt(0) | uppercase
                                }}</span>
                        </div>

                        <div class="notif-content">
                            <p>
                                <span class="actor-name">@{{ notif.actor.username }}</span>
                                {{ notif.message }}
                            </p>
                            <span class="notif-time">{{ notif.createdAt | date:'shortTime' }}</span>
                        </div>

                        <div class="unread-dot" *ngIf="!notif.read"></div>
                    </div>
                </div>
            </div>
        </div>

        <button class="logout-btn" (click)="logout()">Logout</button>
    </div>

    <div class="navbar-menu" *ngIf="!isLoggedIn()">
        <a routerLink="/login" routerLinkActive="active" class="nav-link">Login</a>
        <a routerLink="/register" class="logout-btn" style="text-decoration: none;">Sign Up</a>
    </div>
</nav>
