<div class="post-card">
    <div class="post-header">
        <div class="header-info">
            <a [routerLink]="['/user', post.author.username]" class="author clickable-author">
                {{ post.author.username }}
            </a>
            <span class="timestamp">{{ post.createdAt | date:'short' }}</span>
        </div>

        <div class="header-actions" *ngIf="post.author.username === currentUser">
            <button *ngIf="!isEditing" class="icon-btn edit-btn" (click)="startEditing()" title="Edit Post">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
            </button>

            <button class="icon-btn delete-btn" (click)="deletePost()" title="Delete Post">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </div>
    </div>

    <p *ngIf="!isEditing" class="post-text">{{ post.text }}</p>

    <div *ngIf="isEditing" class="edit-mode-container">
        <textarea [(ngModel)]="editPostText" class="edit-textarea" rows="3" (keyup.escape)="cancelEdit()">
    </textarea>
        <div class="edit-actions">
            <button class="cancel-edit-btn" (click)="cancelEdit()">Cancel</button>
            <button class="save-edit-btn" (click)="saveEdit()" [disabled]="!editPostText.trim()">Save</button>
        </div>
    </div>

    <div class="post-actions">
        <button class="action-btn like-btn" [class.liked]="post.isLikedBy(currentUser)" (click)="toggleLike()">
            <svg viewBox="0 0 24 24" class="heart-icon">
                <path
                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
            </svg>
            <span class="like-count">{{ post.likes.length }}</span>
        </button>

        <div style="flex-grow: 1;"></div>

        <a *ngIf="!isDetailView" [routerLink]="['/post', post.id]" class="action-btn view-post-btn">
            View Post
        </a>
    </div>

    <div *ngIf="post.mediaUrl" class="post-media">
        <img [src]="'http://localhost:8080/uploads/' + post.mediaUrl" alt="Post attachment">
    </div>

    <div class="comments-section">
        <div class="comment-list" *ngIf="post.comments.length > 0">
            <div *ngFor="let comment of post.comments" class="comment-item">
                <span class="comment-author">{{ comment.author.username }}</span>
                <span class="comment-text">{{ comment.text }}</span>
                <span class="comment-time">{{ comment.createdAt | date:'shortTime' }}</span>
            </div>
        </div>
        <div class="comment-input-area">
            <input type="text" [(ngModel)]="newCommentText" placeholder="Write a comment..." class="comment-input"
                (keyup.enter)="submitComment()" />
            <button class="comment-submit-btn" (click)="submitComment()" [disabled]="!newCommentText.trim()">
                Post
            </button>
        </div>
    </div>
</div>
