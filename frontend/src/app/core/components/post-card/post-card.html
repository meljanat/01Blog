<div class="post-card">
    <div class="post-header">
        <div class="header-info">
            <a [routerLink]="['/user', post.author.username]" class="author-thumbnail">
                <img *ngIf="post.author.profilePictureUrl"
                    [src]="'http://localhost:8080/uploads/' + post.author.profilePictureUrl" alt="Avatar">
                <span *ngIf="!post.author.profilePictureUrl">{{ post.author.username.charAt(0) | uppercase }}</span>
            </a>

            <div class="header-text">
                <a [routerLink]="['/user', post.author.username]" class="author clickable-author">
                    {{ post.author.username }}
                </a>
                <span class="timestamp">{{ post.createdAt | date:'short' }}</span>
            </div>
        </div>

        <div class="header-actions">
            <ng-container *ngIf="post.author.username === currentUser || isAdmin">
                <button
                    *ngIf="!isEditing && (post.author.username === currentUser || (isAdmin && post.author.username === currentUser))"
                    class="icon-btn edit-btn" (click)="startEditing()" title="Edit Post">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                </button>

                <button class="icon-btn delete-btn" (click)="deletePost()" title="Delete Post">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </ng-container>

            <button *ngIf="post.author.username !== currentUser && !isAdmin" class="icon-btn report-btn"
                style="color: #ef4444;" (click)="openReportModal('POST', post.id)" title="Report Post">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
                    <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                    <line x1="4" y1="22" x2="4" y2="15"></line>
                </svg>
            </button>
        </div>
    </div>

    <p *ngIf="!isEditing" class="post-text">{{ post.text }}</p>

    <div *ngIf="isEditing" class="edit-mode-container">
        <textarea [(ngModel)]="editPostText" class="edit-textarea" rows="3" (keyup.escape)="cancelEdit()"></textarea>
        <div class="edit-actions">
            <button class="cancel-edit-btn" (click)="cancelEdit()">Cancel</button>
            <button class="save-edit-btn" (click)="saveEdit()" [disabled]="!editPostText.trim()">Save</button>
        </div>
    </div>

    <div *ngIf="post.mediaUrl" class="post-media">
        <video *ngIf="isVideo(post.mediaUrl)" controls class="media-content">
            <source [src]="'http://localhost:8080/uploads/' + post.mediaUrl" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <img *ngIf="!isVideo(post.mediaUrl)" [src]="'http://localhost:8080/uploads/' + post.mediaUrl" alt="Post media"
            class="media-content">
    </div>

    <div class="post-actions">
        <button class="action-btn like-btn" [class.liked]="checkIfLiked()" (click)="toggleLike()">
            <svg viewBox="0 0 24 24" class="heart-icon">
                <path
                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
            </svg>
            <span class="like-count">{{ post.likes.length }}</span>
        </button>

        <button class="action-btn comment-toggle-btn" (click)="toggleComments()">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                </path>
            </svg>
            <span>Comment</span>
        </button>

        <div style="flex-grow: 1;"></div>

        <a *ngIf="!isDetailView" [routerLink]="['/post', post.id]" class="action-btn view-post-btn">
            View Post
        </a>
    </div>

    <div class="comments-section" *ngIf="commentsVisible">

        <div class="comment-list" *ngIf="comments.length > 0">
            <div *ngFor="let comment of comments" class="comment-item">
                <a [routerLink]="['/user', comment.author.username]" class="comment-thumbnail">
                    <img *ngIf="comment.author.profilePictureUrl"
                        [src]="'http://localhost:8080/uploads/' + comment.author.profilePictureUrl" alt="Avatar">
                    <span *ngIf="!comment.author.profilePictureUrl">{{ comment.author.username.charAt(0) | uppercase
                        }}</span>
                </a>

                <div class="comment-content">
                    <div class="comment-header">
                        <div class="comment-header-info">
                            <a [routerLink]="['/user', comment.author.username]"
                                class="comment-author clickable-author">
                                {{ comment.author.username }}
                            </a>
                            <span class="comment-time">{{ comment.createdAt | date:'shortTime' }}</span>
                        </div>

                        <div class="comment-actions">
                            <button *ngIf="comment.author.username === currentUser && editingCommentId !== comment.id"
                                class="icon-btn mini-btn edit-btn" (click)="startEditComment(comment)" title="Edit">
                                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>

                            <button
                                *ngIf="comment.author.username === currentUser || post.author.username === currentUser || isAdmin"
                                class="icon-btn mini-btn delete-btn" (click)="deleteComment(comment.id)" title="Delete">
                                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path
                                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <span *ngIf="editingCommentId !== comment.id" class="comment-text">{{ comment.text }}</span>

                    <div *ngIf="editingCommentId === comment.id" class="edit-comment-area">
                        <input type="text" [(ngModel)]="editCommentText" class="comment-input"
                            (keyup.escape)="cancelEditComment()" (keyup.enter)="saveEditComment(comment)">
                        <div class="edit-actions" style="margin-top: 0.3rem;">
                            <button class="cancel-edit-btn" style="padding: 0.2rem 0.6rem; font-size: 0.75rem;"
                                (click)="cancelEditComment()">Cancel</button>
                            <button class="save-edit-btn" style="padding: 0.2rem 0.6rem; font-size: 0.75rem;"
                                (click)="saveEditComment(comment)">Save</button>
                        </div>
                    </div>
                </div>
            </div>

            <button *ngIf="hasMoreComments" class="btn-load-comments" (click)="loadMoreComments()"
                [disabled]="isLoadingComments">
                {{ isLoadingComments ? 'Loading...' : 'View previous comments' }}
            </button>
        </div>

        <div class="comment-input-area">
            <input type="text" [(ngModel)]="newCommentText" placeholder="Write a comment..." class="comment-input"
                (keyup.enter)="submitComment()" />
            <button class="comment-submit-btn" (click)="submitComment()" [disabled]="!newCommentText.trim()">
                Post
            </button>
        </div>
    </div>
</div>

<app-report-modal *ngIf="showReportModal" [targetType]="reportType" [targetId]="reportTargetId"
    (closeModal)="closeReportModal()"></app-report-modal>
