<div class="dashboard-panel">
    <div class="panel-header">
        <h2>👥 Manage Users</h2>
        <p class="subtitle">Audit the registered members of the 01Blog platform.</p>
    </div>

    <div *ngIf="isLoading" class="loading-state">Loading users...</div>

    <div class="table-container" *ngIf="!isLoading">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let user of users">
                    <td class="id-cell">#{{ user.id }}</td>

                    <td>
                        <div class="user-cell">
                            <div class="mini-avatar">
                                <img *ngIf="user.profilePictureUrl"
                                    [src]="'http://localhost:8080/uploads/' + user.profilePictureUrl" alt="Avatar">
                                <span *ngIf="!user.profilePictureUrl">{{ user.username.charAt(0) | uppercase }}</span>
                            </div>
                            <span class="username-text">@{{ user.username }}</span>
                        </div>
                    </td>

                    <td class="email-cell">{{ user.email }}</td>

                    <td>
                        <span class="role-badge" [ngClass]="isAdmin(user) ? 'admin' : 'user'">
                            {{ getRoleName(user) }}
                        </span>
                    </td>

                    <td>
                        <span class="status-badge" [ngClass]="checkIsBanned(user) ? 'banned' : 'active'">
                            {{ checkIsBanned(user) ? 'Banned' : 'Active' }}
                        </span>
                    </td>

                    <td class="actions-cell">
                        <a [routerLink]="['/user', user.username]" class="audit-link">Audit</a>

                        <button *ngIf="!isAdmin(user)" class="ban-btn" [class.is-banned]="checkIsBanned(user)"
                            (click)="toggleBan(user)">
                            {{ checkIsBanned(user) ? 'Unban' : 'Ban User' }}
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
