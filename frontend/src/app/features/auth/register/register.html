<div class="auth-container">
    <div class="auth-card">
        <form (ngSubmit)="onSubmit()">

            <h2>Join <span class="accent">01Blog</span></h2>
            <p class="subtitle">Create an account to start publishing.</p>

            <div class="success-banner" *ngIf="successMessage">
                {{ successMessage }}
            </div>

            <div class="input-group avatar-upload-group">
                <label class="avatar-preview-container" for="avatar-input">
                    <img *ngIf="previewUrl" [src]="previewUrl" alt="Preview" class="avatar-preview">
                    <div *ngIf="!previewUrl" class="avatar-placeholder">
                        <span>+</span>
                    </div>
                </label>
                <input type="file" id="avatar-input" (change)="onFileSelected($event)" accept="image/*"
                    style="display: none;">
                <span class="optional-text">Profile Picture (Optional)</span>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" [(ngModel)]="userData.username" name="username" placeholder="johndoe" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" [(ngModel)]="userData.email" name="email" placeholder="john@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" [(ngModel)]="userData.password" name="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label>Bio (Optional)</label>
                <textarea [(ngModel)]="bio" name="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
            </div>

            <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mt-3"
                [disabled]="!userData.username || !userData.email || !userData.password">
                Register
            </button>

            <p class="switch-page">Already have an account? <a routerLink="/login">Login here</a></p>
        </form>
    </div>
</div>
