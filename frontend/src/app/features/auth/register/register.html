<div class="auth-container">
    <form class="auth-form" (ngSubmit)="onSubmit()">
        <h2>Join 01Blog</h2>

        <div class="form-group avatar-upload-group">
            <label class="avatar-preview-container" for="avatar-input">
                <img *ngIf="previewUrl" [src]="previewUrl" alt="Preview" class="avatar-preview">
                <div *ngIf="!previewUrl" class="avatar-placeholder">
                    <span>+</span>
                </div>
            </label>
            <input type="file" id="avatar-input" (change)="onFileSelected($event)" accept="image/*"
                style="display: none;">
            <span class="optional-text">Profile Picture (Optional)</span>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" [(ngModel)]="userData.username" name="username" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" [(ngModel)]="userData.email" name="email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" [(ngModel)]="userData.password" name="password" required>
        </div>

        <div class="form-group">
            <label>Bio (Optional)</label>
            <textarea [(ngModel)]="bio" name="bio" rows="3" placeholder="Tell us about yourself...">
        </textarea>
        </div>

        <button type="submit" class="submit-btn"
            [disabled]="!userData.username || !userData.email || !userData.password">Register</button>

        <p class="auth-link">Already have an account? <a routerLink="/login">Login here</a></p>
    </form>
</div>
