<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your credentials to access your account.</p>

        <form (ngSubmit)="onLogin()">
            <div class="input-group">
                <label>Username</label>
                <input type="text" [(ngModel)]="credentials.username" name="username" placeholder="username"
                    required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" [(ngModel)]="credentials.password" name="password" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="primary-btn">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a routerLink="/register">Create one</a></p>
        </div>
    </div>
</div>
