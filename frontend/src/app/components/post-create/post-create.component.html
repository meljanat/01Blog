<div class="create-layout">
    <div class="composer-card">

        <div class="composer-header">
            <a routerLink="/home" class="cancel-btn">Cancel</a>
            <button (click)="onSubmit()" class="post-btn"
                [disabled]="(!postData.content && !selectedFile) || isSubmitting">
                {{ isSubmitting ? 'Posting...' : 'Post' }}
            </button>
        </div>

        <div class="composer-body">
            <div class="avatar-circle">U</div>

            <div class="input-area">
                <input type="text" [(ngModel)]="postData.title" placeholder="Title (optional)" class="title-input">

                <textarea [(ngModel)]="postData.content" placeholder="What is happening?!" rows="4"></textarea>

                <div class="media-preview" *ngIf="mediaPreview">
                    <button class="remove-btn" (click)="removeMedia()">×</button>

                    <img *ngIf="!selectedFile?.type?.startsWith('video')" [src]="mediaPreview">
                    <video *ngIf="selectedFile?.type?.startsWith('video')" [src]="mediaPreview" controls></video>
                </div>

                <div class="toolbar">
                    <label class="icon-btn">
                        <input type="file" (change)="onFileSelected($event)" accept="image/*,video/*" hidden>
                        <span class="icon">🖼️</span>
                    </label>
                    <button class="icon-btn"><span class="icon">GIF</span></button>
                    <button class="icon-btn"><span class="icon">📊</span></button>
                    <button class="icon-btn"><span class="icon">📍</span></button>
                </div>
            </div>
        </div>

    </div>
</div>
